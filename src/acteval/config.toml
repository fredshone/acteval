# Minimum number of times an n-gram must appear across the full observed
# population to be included as a feature. Raising this reduces noise from
# rare activity sequences at the cost of ignoring less common patterns.
[ngrams]
min_count = 3

# Which evaluation jobs to run. Set any key to false to skip that feature.
[jobs.participations]
lengths     = true   # distribution of sequence lengths (number of episodes per person)
rates       = true   # per-activity participation rates
pair_rates  = true   # joint participation rates for all pairs of activities
seq_rates   = false  # participation rates by sequence position (e.g. 0home, 1work)
enum_rates  = false  # participation rates by n-th occurrence of each activity (e.g. home0, home1)

# N-gram transition features. Each captures co-occurrence of consecutive activities.
[jobs.transitions]
"2-gram" = true  # pairs:  home>work
"3-gram" = true  # triples: home>work>home
"4-gram" = true  # quads:   home>work>home>work

# Timing features. A distance of 1.0 means the activity is entirely absent
# from the synthetic population (maximum penalty), not just timed differently.
[jobs.timing]
start_times        = true   # start time distribution per activity × enumeration
durations          = true   # duration distribution per activity × enumeration
start_durations    = true   # joint (start, duration) 2D distribution per activity
joint_durations    = true   # joint (duration_i, duration_i+1) for consecutive activities
start_times_by_act = false  # start time distribution per activity (no enumeration)
end_times_by_act   = false  # end time distribution per activity (no enumeration)
durations_by_act   = false  # duration distribution per activity (no enumeration)
time_consistency   = false  # starts-at-0, ends-at-1440, total-duration-is-1440

[jobs.sequences]
full_sequences = false  # full abbreviated tour-string distributions (e.g. h>w>h)

# Creativity metrics: how novel and diverse the synthetic schedules are.
[jobs.creativity]
enabled = true

# Structural / feasibility metrics: home-based schedules, no consecutive duplicates.
[jobs.structural]
enabled = true
